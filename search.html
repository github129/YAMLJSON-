<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PowerApps YAML 検索</title>
<style>
  body { font-family: sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; }
  textarea { width: 100%; height: 300px; font-family: monospace; font-size: 13px; padding: 8px; box-sizing: border-box; }
  input[type="text"] { padding: 6px; font-size: 14px; }
  table { border-collapse: collapse; width: 100%; margin-top: 12px; font-size: 13px; }
  th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
  th { background: #f0f0f0; }
  .section { margin-top: 24px; }
  mark { background: yellow; }
  .replace-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .replace-row input { width: 200px; }
  .replace-row.disabled input { background: #eee; color: #aaa; }
</style>
</head>
<body>

<h1>YAML 検索</h1>

<textarea id="yamlInput" placeholder="YAMLをここに貼り付け"></textarea>
<br><br>
<button onclick="loadYaml()">読み込む</button>
<span id="loadMsg"></span>

<div class="section">
  <h3>置き換え設定</h3>
  <div id="replaceRows"></div>
  <button onclick="addReplaceRow()">＋ 追加</button>
</div>

<div class="section">
  コントロール名で検索：
  <input type="text" id="searchInput" placeholder="例: Button1" oninput="search()" style="width:300px">
</div>

<div class="section" id="propsSection" style="display:none">
  <h3 id="propsTitle"></h3>
  <table id="propsTable">
    <thead><tr><th>プロパティ</th><th>値</th><th>置き換え後</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div class="section" id="refsSection" style="display:none">
  <h3 id="refsTitle"></h3>
  <table id="refsTable">
    <thead><tr><th>コントロール名</th><th>プロパティ</th><th>値</th><th>置き換え後</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script>
let controls = [];

function addReplaceRow() {
  const div = document.createElement("div");
  div.className = "replace-row";
  div.dataset.enabled = "true";
  div.innerHTML = `
    <input type="text" placeholder="変換前（例: Gallery@2.15.0）">
    <span>→</span>
    <input type="text" placeholder="変換後（例: ギャラリー）">
    <button onclick="toggleRow(this)">無効</button>
    <button onclick="this.parentElement.remove()">削除</button>
  `;
  document.getElementById("replaceRows").appendChild(div);
}

function toggleRow(btn) {
  const row = btn.parentElement;
  const nowEnabled = row.dataset.enabled === "true";
  row.dataset.enabled = nowEnabled ? "false" : "true";
  row.classList.toggle("disabled", nowEnabled);
  btn.textContent = nowEnabled ? "有効" : "無効";
}

function getReplaceRules() {
  return [...document.querySelectorAll(".replace-row")].filter(r => r.dataset.enabled === "true").map(row => {
    const inputs = row.querySelectorAll("input");
    return { from: inputs[0].value, to: inputs[1].value };
  }).filter(r => r.from);
}

function applyReplace(val) {
  let result = String(val);
  for (const rule of getReplaceRules()) result = result.replaceAll(rule.from, rule.to);
  return result;
}

function loadYaml() {
  controls = [];
  extractControls(jsyaml.load(document.getElementById("yamlInput").value), controls, "");
  document.getElementById("loadMsg").textContent = controls.length + " 件読み込みました";
}

function extractControls(obj, result, parentPath) {
  if (!obj || typeof obj !== "object") return;
  if (Array.isArray(obj)) { for (const item of obj) extractControls(item, result, parentPath); return; }
  for (const key of Object.keys(obj)) {
    const value = obj[key];
    if (key === "Children" || key === "children") { extractControls(value, result, parentPath); continue; }
    if (value && typeof value === "object" && !Array.isArray(value) && (value.Control || value.Properties)) {
      const name = key.replace(/^['"]|['"]$/g, "");
      const path = parentPath ? parentPath + " > " + name : name;
      const row = { ControlName: name, ControlPath: path, ControlType: value.Control || "", Variant: value.Variant || "" };
      for (const [pk, pv] of Object.entries(value.Properties || {})) {
        row["Prop_" + pk] = typeof pv === "object" ? JSON.stringify(pv) : String(pv ?? "");
      }
      result.push(row);
      if (value.Children) extractControls(value.Children, result, path);
    } else {
      extractControls(value, result, parentPath);
    }
  }
}

function search() {
  const keyword = document.getElementById("searchInput").value.trim();
  if (!keyword || controls.length === 0) return;

  const target = controls.find(c => c.ControlName === keyword);
  const propsSection = document.getElementById("propsSection");
  if (target) {
    document.getElementById("propsTitle").textContent = `「${keyword}」のプロパティ`;
    document.querySelector("#propsTable tbody").innerHTML = Object.entries(target).map(([k, v]) => {
      const replaced = applyReplace(v);
      return `<tr><td>${k}</td><td>${v}</td><td>${replaced !== String(v) ? `<mark>${replaced}</mark>` : ""}</td></tr>`;
    }).join("");
    propsSection.style.display = "";
  } else {
    propsSection.style.display = "none";
  }

  const refs = [];
  for (const ctrl of controls) {
    for (const [k, v] of Object.entries(ctrl)) {
      if (k === "ControlName" || k === "ControlPath") continue;
      if (String(v).includes(keyword)) refs.push({ ControlName: ctrl.ControlName, Property: k, Value: String(v) });
    }
  }

  document.getElementById("refsTitle").textContent = `「${keyword}」が値に含まれるコントロール（${refs.length} 件）`;
  document.querySelector("#refsTable tbody").innerHTML = refs.map(r => {
    const replaced = applyReplace(r.Value);
    return `<tr><td>${r.ControlName}</td><td>${r.Property}</td><td>${r.Value.replace(keyword, `<mark>${keyword}</mark>`)}</td><td>${replaced !== r.Value ? `<mark>${replaced}</mark>` : ""}</td></tr>`;
  }).join("");
  document.getElementById("refsSection").style.display = "";
}
</script>

</body>
</html>
